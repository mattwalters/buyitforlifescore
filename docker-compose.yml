version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: buyitforlifescore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: buyitforlifescore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: buyitforlifescore-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
  postgres_test_data:
