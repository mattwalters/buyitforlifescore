run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 20

run_launcher:
  module: dagster_celery.run_launcher
  class: CeleryRunLauncher
  config:
    broker:
      env: REDIS_URL
    backend:
      env: REDIS_URL

storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_PG_USER
      password:
        env: DAGSTER_PG_PASSWORD
      hostname:
        env: DAGSTER_PG_HOST
      db_name:
        env: DAGSTER_PG_DB
      port: 5432


